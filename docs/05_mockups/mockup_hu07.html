<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Confirmación de Venta y Ticket (HU-07)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden relative">
        
        <!-- Header de Éxito -->
        <div class="bg-green-600 text-white p-6 text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                <svg class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold">¡Venta Registrada!</h1>
            <p class="text-green-100 mt-1">La operación se guardó correctamente en el sistema.</p>
        </div>

        <!-- Cuerpo del Ticket (Simulación visual de comprobante) -->
        <div class="p-6 bg-gray-50 border-b border-gray-200">
            <div class="bg-white p-4 rounded-lg border border-gray-200 shadow-sm mono text-sm space-y-3">
                <div class="text-center border-b border-dashed border-gray-300 pb-3">
                    <p class="font-bold text-gray-900 text-lg">TIENDA RETAIL S.A.</p>
                    <p class="text-gray-500 text-xs">RUC: 20123456789</p>
                    <p class="text-gray-500 text-xs">05 Jun 2026 - 14:45:30</p>
                </div>
                
                <!-- REQ: El ticket debe guardar fecha y productos vendidos -->
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span>1x Camiseta Básica Azul</span>
                        <span>$25.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span>1x Zapatillas Running T-42</span>
                        <span>$85.00</span>
                    </div>
                </div>

                <div class="border-t border-dashed border-gray-300 pt-3 flex justify-between font-bold text-base text-gray-900">
                    <span>TOTAL</span>
                    <span>$110.00</span>
                </div>

                <!-- REQ: El sistema debe generar un ticket único -->
                <div class="text-center pt-2 border-t border-dashed border-gray-300">
                    <p class="text-xs text-gray-500">COMPROBANTE N°</p>
                    <p class="text-xl font-bold text-gray-900 tracking-wider">T-20260605-142</p>
                </div>
            </div>
        </div>

        <!-- Acciones -->
        <div class="p-6 space-y-3">
            <button class="w-full py-3 bg-teal-600 text-white font-bold rounded-lg hover:bg-teal-700 transition-colors flex items-center justify-center shadow-sm">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Imprimir Comprobante
            </button>
            <button class="w-full py-3 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition-colors">
                Nueva Venta
            </button>
        </div>

        <!-- 
        ========================================================================
        ESTADO ALTERNATIVO: Error de impresión (Caso Borde)
        Descomentar para ver cómo se maneja un fallo de hardware sin perder la venta
        ========================================================================
        <div class="absolute top-4 left-4 right-4 bg-orange-50 border-l-4 border-orange-500 p-3 rounded shadow-lg flex items-start gap-3">
            <svg class="w-5 h-5 text-orange-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <div>
                <p class="text-sm font-bold text-orange-800">Advertencia de Impresión</p>
                <p class="text-xs text-orange-700">La venta se registró, pero la impresora está desconectada. ¿Desea reintentar?</p>
                <button class="mt-2 text-xs font-bold text-orange-700 underline hover:text-orange-900">Reintentar impresión</button>
            </div>
        </div>
        ========================================================================
        -->

    </div>

</body>
</html>
